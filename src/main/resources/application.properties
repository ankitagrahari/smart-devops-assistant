spring.application.name=smart-devops-assistant
spring.main.web-application-type=REACTIVE
server.port=8389

spring.ai.openai.api-key=YOUR_OPENAI_API_KEY
spring.ai.openai.base-url=http://localhost:12434/engines
spring.ai.openai.chat.options.model=ai/gemma3
spring.ai.openai.embedding.options.model=text-embedding-ada-002
spring.ai.openai.embedding.options.encodingFormat=base64

git.owner=ankitagrahari
git.repo.name=smart-devops-assistant
git.api.url=https://api.github.com/
git.branch.name=master

#logging.level.root= info
logging.level.org.springframework.boot.autoconfigure.h2.H2ConsoleAutoConfiguration=DEBUG
logging.level.org.springframework.boot.autoconfigure.web.servlet=DEBUG
logging.level.org.springframework.boot.web.servlet.context=DEBUG
logging.level.org.h2.server=DEBUG

# Chroma Vector Store connection properties
spring.ai.vectorstore.chroma.client.host=http://localhost
spring.ai.vectorstore.chroma.client.port=8000
#spring.ai.vectorstore.chroma.client.key-token=<your access token (if configure)>
#spring.ai.vectorstore.chroma.client.username=<your username (if configure)>
#spring.ai.vectorstore.chroma.client.password=<your password (if configure)>

# Chroma Vector Store collection properties
spring.ai.vectorstore.chroma.initialize-schema=true
spring.ai.vectorstore.chroma.collection-name=prCollection

# H2 Database
spring.datasource.url=jdbc:h2:mem:sda_db 
# ;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate (if using Spring Data JPA)
#spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
#spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true